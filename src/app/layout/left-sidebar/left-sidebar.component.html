<aside class="sidebar">
  <div class="overlay">
    <img src="assets/images/common/profile.png" alt="Profile" />
    <div class="overlay-content"></div>
    <div class="overylay-content-1"></div>
  </div>
  <nav class="sidebar__nav">
    @for (day of days; track day.day) {
    <div class="nav-item" [ngClass]="{
          'nav-item--active': popupService.activeDay() === day.day,
          'nav-item--locked': day.locked,
          'nav-item--completed': isDayCompleted(day.day)
        }" (click)="selectDay(day)" [class.disabled]="day.locked">
      @if(popupService.activeDay() === day.day) {
      <svg class="nav-item__icon" width="250" height="98" viewBox="0 0 250 98" fill="none"
        xmlns="http://www.w3.org/2000/svg">
        <path
          d="M29.3318 79.8581C13.1323 79.8581 -1.36704e-06 66.7259 -2.07514e-06 50.5264C-2.78324e-06 34.3269 13.1323 21.1946 29.3318 21.1946L228.805 21.1946C240.511 21.1946 250 11.7054 250 -3.29845e-06L250 98C250 87.9805 241.878 79.8581 231.858 79.8581L29.3318 79.8581Z"
          fill="var(--secondary)" />
      </svg>

      <svg class="nav-item__icon_mobile" width="97" height="74" viewBox="0 0 97 74" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M20.4825 27.8518C20.5451 12.4514 33.0472 0 48.4478 0C63.9208 0 76.453 12.5645 76.4132 28.0375L76.3482 53.295C76.3188 64.7214 85.5735 74 97 74H0C11.2219 74 20.3318 64.927 20.3774 53.7052L20.4825 27.8518Z"
          fill="var(--secondary)" />
      </svg>
      }
      <span class="nav-item__label">{{ day.label }}</span>
      <span class="nav-item__mobile-label-1">{{ day.mobileLabel }}</span>
      <!-- Mobile layout -->
      <span class="nav-item__mobile-label">Day</span>
      <span class="nav-item__mobile-number">{{ day.day }}</span>
      @if (day.locked) {
      <span class="nav-item__lock-icon">
        <svg width="15" height="17" viewBox="0 0 15 17" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M13.75 5.625H11.25V3.75C11.25 2.75544 10.8549 1.80161 10.1517 1.09835C9.44839 0.395088 8.49456 0 7.5 0C6.50544 0 5.55161 0.395088 4.84835 1.09835C4.14509 1.80161 3.75 2.75544 3.75 3.75V5.625H1.25C0.918479 5.625 0.600537 5.7567 0.366116 5.99112C0.131696 6.22554 0 6.54348 0 6.875V15.625C0 15.9565 0.131696 16.2745 0.366116 16.5089C0.600537 16.7433 0.918479 16.875 1.25 16.875H13.75C14.0815 16.875 14.3995 16.7433 14.6339 16.5089C14.8683 16.2745 15 15.9565 15 15.625V6.875C15 6.54348 14.8683 6.22554 14.6339 5.99112C14.3995 5.7567 14.0815 5.625 13.75 5.625ZM5 3.75C5 3.08696 5.26339 2.45107 5.73223 1.98223C6.20107 1.51339 6.83696 1.25 7.5 1.25C8.16304 1.25 8.79893 1.51339 9.26777 1.98223C9.73661 2.45107 10 3.08696 10 3.75V5.625H5V3.75Z"
            fill="currentColor" />
        </svg>
      </span>
      }
      @if(isDayCompleted(day.day)) {
      <span class="nav-item__completed">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" fill="#22c55e"/>
          <path d="M8 12.5l2.5 2.5 5.5-5.5" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      }
    </div>
    }
  </nav>
</aside>
